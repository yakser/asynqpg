name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  # The special value "local" tells Go to use the bundled Go version rather
  # than trying to fetch one according to a `toolchain` value in `go.mod`.
  # This ensures that we're really running the Go version in the CI matrix
  # rather than one that the Go command has upgraded to automatically.
  GOTOOLCHAIN: local

jobs:
  unit-tests:
    name: Unit tests (go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder
        run: make fake-assets

      - name: Run unit tests (root)
        run: go test -race -count=1 ./...

      - name: Run unit tests (ui)
        working-directory: ui
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "stable"

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder
        run: make fake-assets

      - uses: golangci/golangci-lint-action@v9

      - name: Lint UI module
        working-directory: ui
        run: golangci-lint run ./...

  integration-tests:
    name: Integration tests (go ${{ matrix.go-version }})
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder for dist folder
        run: make fake-assets

      - name: Run integration tests (root)
        run: go test -race -count=1 -tags=integration ./...

      - name: Run integration tests (ui)
        working-directory: ui
        run: go test -race -count=1 -tags=integration ./...
