name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder
        run: make fake-assets

      - name: Run unit tests (root)
        run: go test -race -count=1 ./...

      - name: Run unit tests (ui)
        working-directory: ui
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder
        run: make fake-assets

      - uses: golangci/golangci-lint-action@v9

      - name: Lint UI module
        working-directory: ui
        run: golangci-lint run ./...

  integration-tests:
    name: Integration Tests
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Set up Go workspace
        run: go work init . ./ui

      - name: Create frontend placeholder for dist folder
        run: make fake-assets

      - name: Run integration tests (root)
        run: go test -race -count=1 -tags=integration ./...

      - name: Run integration tests (ui)
        working-directory: ui
        run: go test -race -count=1 -tags=integration ./...
